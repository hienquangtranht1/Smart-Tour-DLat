<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hồ Sơ Của Tôi - Smart Tour Đà Lạt</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary:#2563eb; --secondary:#16a34a; --bg-dark:#f8fafc; --bg-card:#ffffff; --text-muted:#64748b; }
        * { box-sizing:border-box; margin:0; padding:0; }
        body { background:var(--bg-dark); color:#1e293b; font-family:'Segoe UI',sans-serif; padding-top:20px; }
        .container { max-width:900px; margin:0 auto; padding:20px; }
        
        /* HEADER */
        .profile-header { background:var(--bg-card); border-radius:16px; padding:2rem; display:flex; gap:2rem; align-items:center; box-shadow:0 4px 6px rgba(0,0,0,.05); border:1px solid #e2e8f0; margin-bottom:2rem; position:relative; overflow:hidden; }
        .profile-header::before { content:''; position:absolute; top:0; left:0; right:0; height:6px; background:linear-gradient(90deg,var(--primary),var(--secondary)); }
        .avatar-wrap { position:relative; width:120px; height:120px; }
        .avatar { width:100%; height:100%; border-radius:50%; object-fit:cover; border:4px solid var(--bg-card); box-shadow:0 0 0 2px var(--primary); }
        .avatar-edit { position:absolute; bottom:0; right:0; background:var(--primary); color:white; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; border:3px solid var(--bg-card); transition:.2s; }
        .avatar-edit:hover { background:var(--secondary); transform:scale(1.1); }
        .profile-info h1 { margin-bottom:.3rem; font-size:1.8rem; }
        .badge { display:inline-block; padding:.3rem .8rem; border-radius:999px; font-size:.75rem; font-weight:700; margin-top:.5rem; }
        .badge-admin { background:#fee2e2; color:#dc2626; border:1px solid #fca5a5; }
        .badge-staff { background:#fef3c7; color:#d97706; border:1px solid #fde68a; }
        .badge-user { background:#dcfce7; color:#16a34a; border:1px solid #bbf7d0; }
        
        /* CARD */
        .card { background:var(--bg-card); border-radius:16px; padding:2rem; margin-bottom:2rem; box-shadow:0 4px 6px rgba(0,0,0,.05); border:1px solid #e2e8f0; }
        .card-title { font-size:1.1rem; color:var(--primary); margin-bottom:1.5rem; display:flex; align-items:center; gap:.5rem; border-bottom:1px solid #e2e8f0; padding-bottom:1rem; }
        
        /* FORMS */
        .grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:1.5rem; }
        .form-group { margin-bottom:1.5rem; }
        .form-group label { display:block; font-size:.85rem; color:var(--text-muted); margin-bottom:.5rem; font-weight:600; }
        .form-group input, .form-group textarea { width:100%; padding:.8rem 1.2rem; background:#ffffff; border:1px solid #cbd5e1; border-radius:10px; color:#1e293b; font-size:.95rem; transition:.2s; }
        .form-group input:focus, .form-group textarea:focus { outline:none; border-color:var(--primary); box-shadow:0 0 0 3px rgba(37,99,235,.1); }
        .form-group input[disabled] { opacity:.6; cursor:not-allowed; background:#f1f5f9; }
        
        .btn { padding:.8rem 1.5rem; border:none; border-radius:10px; font-size:.95rem; font-weight:600; cursor:pointer; transition:.2s; display:inline-flex; align-items:center; gap:.5rem; }
        .btn-primary { background:var(--primary); color:white; }
        .btn-primary:hover { background:var(--primary-hover); transform:translateY(-2px); }
        .btn-danger { background:#fee2e2; color:#dc2626; border:1px solid #fca5a5; }
        .btn-danger:hover { background:#dc2626; color:white; }
        
        .nav-back { display:inline-flex; align-items:center; gap:.5rem; color:var(--text-muted); text-decoration:none; margin-bottom:2rem; font-weight:600; transition:.2s; }
        .nav-back:hover { color:var(--primary); transform:translateX(-5px); }
        
        .toast { position:fixed; top:20px; right:20px; padding:1rem 1.5rem; border-radius:10px; font-size:.9rem; font-weight:600; z-index:9999; display:none; animation: slideIn .3s ease forwards; }
        .toast.ok { background:#10b981; color:white; box-shadow:0 10px 20px rgba(16,185,129,.3); }
        .toast.err { background:#ef4444; color:white; box-shadow:0 10px 20px rgba(239,68,68,.3); }
        @keyframes slideIn { from{transform:translateX(100%);opacity:0} to{transform:translateX(0);opacity:1} }
        
        /* STATUS BANNER */
        .status-banner { margin-top:1rem; padding:1rem; border-radius:10px; font-size:.9rem; display:flex; align-items:center; gap:.8rem; }
        .status-pending { background:rgba(245,158,11,.1); border:1px solid rgba(245,158,11,.3); color:#fbbf24; }
        .status-approved { background:rgba(16,185,129,.1); border:1px solid rgba(16,185,129,.3); color:#34d399; }
    </style>
</head>
<body>

<div class="container">
    <a href="javascript:history.back()" class="nav-back"><i class="fas fa-arrow-left"></i> Quay lại</a>
    
    <!-- HEADER HỒ SƠ -->
    <div class="profile-header">
        <div class="avatar-wrap">
            <img src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" id="profAvatarImg" class="avatar" alt="Avatar">
            <div class="avatar-edit" onclick="changeAvatar()"><i class="fas fa-camera"></i></div>
            <input type="hidden" id="profAvatarUrl">
        </div>
        <div class="profile-info">
            <h1 id="profNameTitle">Đang tải...</h1>
            <div style="color:var(--text-muted); font-size:.95rem;"><i class="fas fa-envelope"></i> <span id="profEmailTxt"></span></div>
            <div id="profRoleBadge"></div>
            
            <div id="staffStatusBanner" style="display:none"></div>
        </div>
    </div>
    
    <!-- FORM THÔNG TIN CÁ NHÂN -->
    <div class="card">
        <h2 class="card-title"><i class="fas fa-user"></i> Thông tin cá nhân</h2>
        <form onsubmit="saveProfile(event)">
            <div class="grid-2">
                <div class="form-group">
                    <label>Tên đăng nhập (Username)</label>
                    <input type="text" id="profUsername" disabled>
                </div>
                <div class="form-group">
                    <label>Email (Đã xác minh)</label>
                    <input type="email" id="profEmail" disabled>
                </div>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Họ và tên đầy đủ</label>
                    <input type="text" id="profFullName" required>
                </div>
                <div class="form-group">
                    <label>Số điện thoại</label>
                    <input type="tel" id="profPhone" required>
                </div>
            </div>
            
            <!-- FORM ĐẠI LÝ (CHỈ STAFF) -->
            <div id="staffSection" style="display:none">
                <h2 class="card-title" style="margin-top:2rem"><i class="fas fa-building"></i> Hồ sơ Công ty / Đại lý</h2>
                <div class="form-group">
                    <label>Tên Công ty / Đại lý *</label>
                    <input type="text" id="staffAgencyName">
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Mã số Kinh doanh / Giấy phép</label>
                        <input type="text" id="staffLicense">
                    </div>
                    <div class="form-group">
                        <label>Mã số Thuế</label>
                        <input type="text" id="staffTaxCode">
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label>Nhập SĐT Công ty</label>
                        <input type="text" id="staffContactPhone">
                    </div>
                    <div class="form-group">
                        <label>Website</label>
                        <input type="url" id="staffWebsite">
                    </div>
                </div>
                <div class="form-group">
                    <label>Địa chỉ Trụ sở</label>
                    <input type="text" id="staffAddress">
                </div>
                <div class="form-group">
                    <label>Giới thiệu Công ty</label>
                    <textarea id="staffDesc" rows="3" placeholder="Viết vài dòng giới thiệu về công ty của bạn..."></textarea>
                </div>
                <div class="form-group">
                    <label>Link Logo Đại lý (Ảnh)</label>
                    <input type="text" id="staffLogoUrl" placeholder="https://...">
                </div>
            </div>
            
            <button type="submit" class="btn btn-primary" id="btnSaveProfile"><i class="fas fa-save"></i> Lưu Thay Đổi</button>
        </form>
    </div>
    
    <!-- ĐỔI MẬT KHẨU -->
    <div class="card">
        <h2 class="card-title"><i class="fas fa-lock"></i> Đổi mật khẩu</h2>
        <form onsubmit="changePassword(event)">
            <div class="grid-2">
                <div class="form-group">
                    <label>Mật khẩu hiện tại</label>
                    <input type="password" id="oldPass" required>
                </div>
                <div>
                    <div class="form-group">
                        <label>Mật khẩu mới</label>
                        <input type="password" id="newPass" required minlength="6">
                    </div>
                    <div class="form-group">
                        <label>Xác nhận Mật khẩu mới</label>
                        <input type="password" id="confirmPass" required minlength="6">
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" id="btnChangePass"><i class="fas fa-key"></i> Đổi Mật Khẩu</button>
        </form>
    </div>
    
    <div style="text-align:right">
        <button class="btn btn-danger" onclick="doLogout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất an toàn</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    let currentRole = '';

    window.onload = async () => {
        try {
            const res = await fetch('/api/auth/profile');
            if (!res.ok) { location.href = 'index.html'; return; }
            const data = await res.json();
            
            // Map data
            currentRole = data.role;
            document.getElementById('profNameTitle').innerText = data.fullName || data.username;
            document.getElementById('profEmailTxt').innerText = data.email;
            document.getElementById('profUsername').value = data.username;
            document.getElementById('profFullName').value = data.fullName || '';
            document.getElementById('profEmail').value = data.email;
            document.getElementById('profPhone').value = data.phone || '';
            
            if (data.avatarUrl) {
                document.getElementById('profAvatarImg').src = data.avatarUrl;
                document.getElementById('profAvatarUrl').value = data.avatarUrl;
            } else {
                document.getElementById('profAvatarImg').src = `https://ui-avatars.com/api/?name=${data.username}&background=6366f1&color=fff`;
            }
            
            // Badge
            let badgeHtml = '';
            if (currentRole === 'ADMIN') badgeHtml = `<span class="badge badge-admin"><i class="fas fa-shield-alt"></i> Quản trị viên Hệ thống</span>`;
            else if (currentRole === 'STAFF') badgeHtml = `<span class="badge badge-staff"><i class="fas fa-store"></i> Đại lý Du lịch</span>`;
            else badgeHtml = `<span class="badge badge-user"><i class="fas fa-user-check"></i> Khách Du lịch</span>`;
            document.getElementById('profRoleBadge').innerHTML = badgeHtml;
            
            // Nếu là STAFF -> Điền form Agency
            if (currentRole === 'STAFF' && data.agency) {
                document.getElementById('staffSection').style.display = 'block';
                const ag = data.agency;
                document.getElementById('staffAgencyName').value = ag.agencyName || '';
                document.getElementById('staffLicense').value = ag.businessLicense || '';
                document.getElementById('staffTaxCode').value = ag.taxCode || '';
                document.getElementById('staffContactPhone').value = ag.contactPhone || '';
                document.getElementById('staffWebsite').value = ag.website || '';
                document.getElementById('staffAddress').value = ag.address || '';
                document.getElementById('staffDesc').value = ag.description || '';
                document.getElementById('staffLogoUrl').value = ag.logoUrl || '';
                
                const banner = document.getElementById('staffStatusBanner');
                banner.style.display = 'flex';
                if (ag.isApproved) {
                    banner.className = 'status-banner status-approved';
                    banner.innerHTML = '<i class="fas fa-check-circle fa-2x"></i> <div><b>Tài khoản đã phê duyệt</b><br>Bạn có thể đăng và quản lý dịch vụ kinh doanh.</div>';
                } else {
                    banner.className = 'status-banner status-pending';
                    banner.innerHTML = '<i class="fas fa-clock fa-2x"></i> <div><b>Hồ sơ đang chờ xét duyệt</b><br>Admin cần kiểm tra hồ sơ doanh nghiệp của bạn trước khi cấp quyền truy cập đầy đủ.</div>';
                }
            }

        } catch (e) {}
    };

    async function saveProfile(e) {
        e.preventDefault();
        const btn = document.getElementById('btnSaveProfile');
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang lưu...';
        
        const params = new URLSearchParams({
            fullName: document.getElementById('profFullName').value.trim(),
            phone: document.getElementById('profPhone').value.trim(),
            avatarUrl: document.getElementById('profAvatarUrl').value.trim()
        });
        
        if (currentRole === 'STAFF') {
            params.append('agencyName', document.getElementById('staffAgencyName').value.trim());
            params.append('businessLicense', document.getElementById('staffLicense').value.trim());
            params.append('taxCode', document.getElementById('staffTaxCode').value.trim());
            params.append('contactPhone', document.getElementById('staffContactPhone').value.trim());
            params.append('website', document.getElementById('staffWebsite').value.trim());
            params.append('address', document.getElementById('staffAddress').value.trim());
            params.append('description', document.getElementById('staffDesc').value.trim());
            params.append('logoUrl', document.getElementById('staffLogoUrl').value.trim());
        }

        try {
            const res = await fetch('/api/auth/profile', { method: 'PUT', body: params });
            const data = await res.json();
            showToast(data.message || 'Cập nhật thành công!', !res.ok);
            if (res.ok) document.getElementById('profNameTitle').innerText = document.getElementById('profFullName').value;
        } catch { showToast('Lỗi mạng!', true); }
        finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-save"></i> Lưu Thay Đổi'; }
    }

    async function changePassword(e) {
        e.preventDefault();
        const oldP = document.getElementById('oldPass').value;
        const newP = document.getElementById('newPass').value;
        const confP = document.getElementById('confirmPass').value;
        
        if (newP !== confP) { showToast('Mật khẩu xác nhận không khớp!', true); return; }
        
        const btn = document.getElementById('btnChangePass');
        btn.disabled = true; btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang đổi...';
        
        try {
            const res = await fetch('/api/auth/change-password', {
                method: 'POST', body: new URLSearchParams({ oldPassword: oldP, newPassword: newP })
            });
            const data = await res.json();
            showToast(data.message || data.error, !res.ok);
            if (res.ok) { document.getElementById('oldPass').value=''; document.getElementById('newPass').value=''; document.getElementById('confirmPass').value=''; }
        } catch { showToast('Lỗi mạng!', true); }
        finally { btn.disabled = false; btn.innerHTML = '<i class="fas fa-key"></i> Đổi Mật Khẩu'; }
    }

    async function doLogout() {
        if (!confirm('Bạn có chắc muốn đăng xuất?')) return;
        await fetch('/api/auth/logout', { method: 'POST' });
        location.href = 'index.html';
    }

    function changeAvatar() {
        const url = prompt('Nhập link hình ảnh Avatar mới (http...):', document.getElementById('profAvatarUrl').value);
        if (url) {
            document.getElementById('profAvatarUrl').value = url;
            document.getElementById('profAvatarImg').src = url;
        }
    }

    function showToast(msg, isErr) {
        const t = document.getElementById('toast');
        t.textContent = msg; t.className = 'toast ' + (isErr ? 'err' : 'ok');
        t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 3000);
    }
</script>
</body>
</html>
