<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Tour Đà Lạt | Lỗi Trang Không Tồn Tại</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f8fafc; }
        .error-wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 2rem;
            background-image: radial-gradient(circle at top right, rgba(99, 102, 241, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(16, 185, 129, 0.1), transparent 40%);
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            color: transparent;
            background: linear-gradient(135deg, #6366f1, #10b981);
            -webkit-background-clip: text;
            background-clip: text;
            line-height: 1;
            margin-bottom: 0.5rem;
            text-shadow: 0 10px 30px rgba(99, 102, 241, 0.2);
            animation: float 4s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }
        .error-title {
            font-size: 2rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 1rem;
        }
        .error-desc {
            color: #64748b;
            font-size: 1.1rem;
            max-width: 500px;
            margin-bottom: 2rem;
            line-height: 1.6;
        }
        .btn-home {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            padding: 1rem 2rem;
            border-radius: 9999px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            display: inline-flex;
            align-items: center;
            gap: 0.75rem;
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
            transition: all 0.3s ease;
        }
        .btn-home:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 15px 35px rgba(99, 102, 241, 0.5);
            color: white;
        }
        .animation-box {
            position: relative;
            margin-bottom: 2rem;
        }
        .spinner {
            color: #cbd5e1;
            font-size: 3rem;
            animation: spin 3s linear infinite;
            margin-bottom: 1rem;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="error-wrapper">
        <div class="animation-box">
            <i class="fas fa-satellite-dish spinner"></i>
            <div class="error-code">404</div>
        </div>
        
        <h1 class="error-title">Oops! Mất Kết Nối Trang</h1>
        
        <p class="error-desc">
            Có vẻ như trang web bạn đang tìm kiếm không tồn tại, đường dẫn đã bị hỏng, 
            hoặc do <b>lỗi mạng (lag)</b> khiến hệ thống không thể tải kịp dữ liệu.
        </p>

        <a href="/index.html" class="btn-home">
            <i class="fas fa-home"></i> Trở Về Trang Chủ
        </a>
    </div>

</body>
</html>
