<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Tour Đà Lạt | Đăng Nhập</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.95)),
                url('https://images.unsplash.com/photo-1559599525-47d0af8071e6?q=80&w=2070');
            background-size: cover;
            background-position: center;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            text-align: center;
        }

        .role-selector {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin: 2rem 0;
        }

        .role-btn {
            background: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 1rem 0.5rem;
            border-radius: var(--radius-md);
            color: #64748b;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
        }

        .role-btn:hover, .role-btn.active {
            background: rgba(99, 102, 241, 0.2);
            border-color: var(--primary);
            color: white;
            transform: translateY(-2px);
        }

        .role-btn i { font-size: 1.5rem; }
        .role-btn span { font-size: 0.8rem; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card animate-fade-in" style="background:#ffffff;border-radius:20px;box-shadow:0 10px 40px rgba(0,0,0,0.1);border:1px solid #e2e8f0;">
            <div style="margin-bottom: 2rem;">
                <i class="fas fa-leaf text-4xl mb-4" style="color: var(--secondary)"></i>
                <h1 class="text-2xl mb-2">Smart Tour <span class="text-gradient">Đà Lạt</span></h1>
                <p class="text-sm">Hệ thống Thiết kế Lịch trình AI & Đặt tour Thông Minh</p>
            </div>

            <div class="role-selector">
                <div class="role-btn active" onclick="selectRole('user', this)">
                    <i class="fas fa-user-astronaut"></i>
                    <span>Khách Du Lịch</span>
                </div>
                <div class="role-btn" onclick="selectRole('staff', this)">
                    <i class="fas fa-store"></i>
                    <span>Đại Lý (Staff)</span>
                </div>
                <div class="role-btn" onclick="selectRole('admin', this)">
                    <i class="fas fa-user-shield"></i>
                    <span>Quản Trị Viên</span>
                </div>
            </div>

            <div id="loginSection">
                <form id="loginForm" class="flex-col gap-4 text-left" onsubmit="handleLogin(event)">
                    <div class="flex-col gap-2">
                        <label class="text-sm" style="color:var(--text-main); font-weight:600">Tài khoản</label>
                        <input type="text" id="logUsername" class="input-glass" style="color:#1e293b;background:#f8fafc;border:1px solid #cbd5e1" placeholder="Nhập tên đăng nhập..." required>
                    </div>
                    <div class="flex-col gap-2">
                        <label class="text-sm" style="color:var(--text-main); font-weight:600">Mật khẩu</label>
                        <input type="password" id="logPassword" class="input-glass" style="color:#1e293b;background:#f8fafc;border:1px solid #cbd5e1" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="margin-top: 1rem; width: 100%;">
                        Đăng Nhập Hệ Thống <i class="fas fa-arrow-right ml-2"></i>
                    </button>
                </form>
                
                <p class="text-sm mt-6">
                    Chưa có tài khoản? <a href="register.html" style="color: var(--primary); text-decoration: none;">Đăng ký ngay</a>
                </p>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        let currentRole = 'user';

        function selectRole(role, element) {
            currentRole = role;
            document.querySelectorAll('.role-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        async function handleLogin(e) {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            const originBtn = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xác thực...';
            btn.style.opacity = '0.8';
            
            const username = document.getElementById('logUsername').value;
            const password = document.getElementById('logPassword').value;

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: `username=${encodeURIComponent(username)}&password=${encodeURIComponent(password)}`
                });
                const data = await response.json();
                
                if (response.ok && data.status === 'success') {
                    window.location.href = data.redirect;
                } else {
                    alert(data.message || 'Tài khoản hoặc mật khẩu không hợp lệ!');
                    btn.innerHTML = originBtn;
                    btn.style.opacity = '1';
                }
            } catch(error) {
                alert('Không thể kết nối đến máy chủ Backend!');
                btn.innerHTML = originBtn;
                btn.style.opacity = '1';
            }
        }
    </script>
</body>
</html>
