<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Tour Đà Lạt | Quên Mật Khẩu</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        .login-wrapper {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.9), rgba(255, 255, 255, 0.95)),
                url('https://images.unsplash.com/photo-1559599525-47d0af8071e6?q=80&w=2070');
            background-size: cover;
            background-position: center;
        }
        .login-card {
            width: 100%;
            max-width: 450px;
            padding: 3rem;
            text-align: center;
            position: relative;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
        }
        .back-btn {
            position: absolute; 
            top: 25px; 
            left: 25px; 
            color: #64748b; 
            text-decoration: none; 
            font-size: 0.9rem; 
            font-weight: 600; 
            display: flex; 
            align-items: center; 
            gap: 0.5rem; 
            transition: all 0.3s;
        }
        .back-btn:hover {
            color: var(--primary);
        }
        /* Hidden class for steps */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card animate-fade-in">
            <a href="login.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Đăng nhập
            </a>
            
            <div style="margin-bottom: 2rem; margin-top: 1rem;">
                <h1 style="font-size: 1.8rem; font-weight: 800; color: #1e293b; letter-spacing: -0.5px;">Quên Mật Khẩu?</h1>
                <p style="color: #64748b; font-size: 0.9rem; margin-top: 0.5rem;">Đừng lo lắng! Hãy nhập email bạn đã đăng ký để lấy lại mật khẩu.</p>
            </div>

            <!-- Bước 1: Gửi Email -->
            <form id="step1Form" class="flex-col gap-4 text-left" onsubmit="handleSendOtp(event)">
                <div class="flex-col gap-2 relative">
                    <label class="text-sm" style="color:var(--text-main); font-weight:600">Email của bạn</label>
                    <i class="fas fa-envelope absolute left-4 top-[38px] text-gray-400"></i>
                    <input type="email" id="email" class="input-glass" style="color:#1e293b;background:#f8fafc;border:1px solid #cbd5e1" placeholder="name@example.com" required>
                </div>

                <button type="submit" id="btnSendOtp" class="btn btn-primary" style="margin-top: 0.5rem; width: 100%;">
                    Nhận Mã Xác Nhận <i class="fas fa-paper-plane ml-2"></i>
                </button>
            </form>

            <!-- Bước 2: Nhập OTP và Mật khẩu mới -->
            <form id="step2Form" class="flex-col gap-4 text-left hidden" onsubmit="handleResetPassword(event)">
                <div style="background: rgba(16, 185, 129, 0.1); padding: 1rem; border-radius: 8px; margin-bottom: 1rem; text-align: center; border: 1px dashed #10b981;">
                    <p style="color: #059669; font-size: 0.85rem; margin: 0; font-weight: 600;">✅ Mã OTP đã được gửi đến email của bạn!</p>
                </div>

                <div class="flex-col gap-2 relative">
                    <label class="text-sm" style="color:var(--text-main); font-weight:600">Mã Xác Nhận OTP (6 số)</label>
                    <i class="fas fa-key absolute left-4 top-[38px] text-gray-400"></i>
                    <input type="text" id="otpCode" class="input-glass" style="color:#1e293b;background:#f8fafc;border:1px solid #cbd5e1; letter-spacing: 5px; font-weight: bold; text-align: center;" placeholder="••••••" maxlength="6" required>
                </div>

                <div class="flex-col gap-2 relative mt-2">
                    <label class="text-sm" style="color:var(--text-main); font-weight:600">Mật Khẩu Mới</label>
                    <i class="fas fa-lock absolute left-4 top-[38px] text-gray-400"></i>
                    <input type="password" id="newPassword" class="input-glass" style="color:#1e293b;background:#f8fafc;border:1px solid #cbd5e1" placeholder="••••••••" required minlength="6">
                </div>
                
                <div class="flex-col gap-2 relative mt-2">
                    <label class="text-sm" style="color:var(--text-main); font-weight:600">Nhập lại Mật Khẩu</label>
                    <i class="fas fa-lock absolute left-4 top-[38px] text-gray-400"></i>
                    <input type="password" id="confirmPassword" class="input-glass" style="color:#1e293b;background:#f8fafc;border:1px solid #cbd5e1" placeholder="••••••••" required minlength="6">
                </div>

                <button type="submit" id="btnResetPass" class="btn btn-primary" style="margin-top: 1rem; width: 100%;">
                    Đổi Mật Khẩu Ngay <i class="fas fa-check-circle ml-2"></i>
                </button>
            </form>
            
        </div>
    </div>

    <script>
        async function handleSendOtp(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const btn = document.getElementById('btnSendOtp');
            
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang gửi...';
            btn.disabled = true;

            try {
                const formData = new URLSearchParams();
                formData.append('email', email);

                const response = await fetch('/api/auth/send-otp-existing', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();
                
                if (response.ok && data.status === 'ok') {
                    // Hiển thị Form Bước 2
                    document.getElementById('step1Form').classList.add('hidden');
                    document.getElementById('step2Form').classList.remove('hidden');
                } else {
                    Swal.fire('Lỗi', data.message || 'Email này chưa được đăng ký trong hệ thống!', 'error');
                }
            } catch (error) {
                Swal.fire('Lỗi mạng', 'Không thể kết nối đến máy chủ: ' + error.message, 'error');
            } finally {
                btn.innerHTML = 'Nhận Mã Xác Nhận <i class="fas fa-paper-plane ml-2"></i>';
                btn.disabled = false;
            }
        }

        async function handleResetPassword(event) {
            event.preventDefault();
            const email = document.getElementById('email').value.trim();
            const otpCode = document.getElementById('otpCode').value.trim();
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('btnResetPass');

            if (newPassword !== confirmPassword) {
                Swal.fire('Chú ý', 'Mật khẩu nhập lại không khớp!', 'warning');
                return;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Đang xử lý...';
            btn.disabled = true;

            try {
                const formData = new URLSearchParams();
                formData.append('email', email);
                formData.append('otp', otpCode);
                formData.append('newPassword', newPassword);

                const response = await fetch('/api/auth/forgot-password/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });

                const data = await response.json();
                
                if (response.ok && data.status === 'ok') {
                    Swal.fire({
                        icon: 'success',
                        title: 'Tuyệt vời!',
                        text: data.message,
                        confirmButtonText: 'Đăng nhập ngay'
                    }).then(() => {
                        window.location.href = 'login.html';
                    });
                } else {
                    Swal.fire('Lỗi', data.message || 'Đã có lỗi xảy ra!', 'error');
                }
            } catch (error) {
                Swal.fire('Lỗi mạng', 'Không thể kết nối đến máy chủ: ' + error.message, 'error');
            } finally {
                btn.innerHTML = 'Đổi Mật Khẩu Ngay <i class="fas fa-check-circle ml-2"></i>';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
