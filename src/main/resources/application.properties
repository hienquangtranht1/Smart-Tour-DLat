spring.application.name=smarttour

# ===============================
# DATABASE CONFIGURATION (XAMPP MySQL)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/smart_tour_db?createDatabaseIfNotExist=true&useUnicode=yes&characterEncoding=UTF-8&serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# HIBERNATE / JPA CONFIGURATION
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Chống lưu nháp Cache Trình duyệt cho file HTML
spring.web.resources.cache.period=0

# ===============================
# SERVER CONFIGURATION
# ===============================
server.port=8080

# Cấu hình Upload File (Tối ưu cho việc Up ảnh Tour/Hotel)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

